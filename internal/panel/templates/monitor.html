{{define "monitor"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>{{template "head" .}}</head>
<body class="bg-gray-950 text-gray-100 flex flex-col h-screen">
{{template "mobile-header" .}}
<div class="flex flex-1 overflow-hidden">
  <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-60 bg-gray-900 border-r border-gray-800 flex-shrink-0 -translate-x-full lg:relative lg:inset-auto lg:translate-x-0 transition-transform duration-200">
    {{template "nav" .}}
  </aside>
  <div class="flex-1 overflow-auto">
    <div class="p-4 md:p-6 max-w-5xl">
      <div class="mb-6">
        <h1 class="text-xl font-semibold text-gray-100">Monitor</h1>
        <p class="text-sm text-gray-500 mt-0.5">服务与节点状态监控</p>
      </div>

      <!-- 统计概览 (30s 轮询) -->
      <div id="stats-container" hx-get="/panel/stats" hx-trigger="load, every 30s" hx-swap="innerHTML">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
          <div class="bg-gray-900 rounded-xl border border-gray-800 p-5">
            <div class="text-2xl font-bold text-gray-100">—</div>
            <div class="text-xs text-gray-500 mt-1">加载中...</div>
          </div>
        </div>
      </div>

      <!-- 节点实时监控（SSE，1s 刷新，丰富视图） -->
      <div class="mt-8">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-sm font-medium text-gray-400 uppercase tracking-wider">节点实时监控</h2>
          <span class="text-xs text-gray-600 flex items-center gap-1.5">
            <span class="inline-block w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
            实时更新
          </span>
        </div>
        <div id="monitor-nodes-container">
          <div class="bg-gray-900 rounded-xl border border-gray-800 p-5 text-sm text-gray-600 animate-pulse">正在获取节点状态...</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  var container = document.getElementById('monitor-nodes-container');
  var es = new EventSource('/panel/monitor-nodes/stream');
  es.addEventListener('update', function(e) {
    container.innerHTML = e.data;
  });
  es.onerror = function() {
    // 断线后浏览器会自动重连，无需额外处理
  };
})();
</script>

{{template "modal-container" .}}
{{template "toast" .}}
</body>
</html>
{{end}}
