{{define "head"}}
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pulse</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/htmx.org@2.0.3/dist/htmx.min.js"></script>
<script>
function showToast(msg, type) {
  const toast = document.getElementById('toast');
  if (!toast) return;
  const el = document.createElement('div');
  const colors = type === 'error'
    ? 'bg-red-500/15 border-red-500/30 text-red-400'
    : 'bg-emerald-500/15 border-emerald-500/30 text-emerald-400';
  el.className = `px-4 py-2.5 rounded-lg border text-sm ${colors} shadow-lg transition-all`;
  el.textContent = msg;
  toast.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}
document.addEventListener('htmx:afterRequest', function(e) {
  if (e.detail.failed) {
    let msg = '操作失败';
    try { msg = JSON.parse(e.detail.xhr.responseText).error || msg; } catch {}
    showToast(msg, 'error');
  }
});
document.addEventListener('htmx:sendError', function(e) {
  showToast('网络请求失败，请重试', 'error');
});
document.addEventListener('pulseToast', function(e) {
  showToast(e.detail.value, 'success');
});
// Reality 密钥对生成
async function ibGenReality(form) {
  const btn = form.querySelector('button[onclick*="ibGenReality"]');
  if (btn) btn.textContent = '生成中...';
  try {
    const res = await fetch('/panel/tools/reality-keypair', {credentials: 'same-origin'});
    if (!res.ok) {
      const text = await res.text();
      throw new Error(res.status + ': ' + text.slice(0, 100));
    }
    const d = await res.json();
    form.querySelector('[name=reality_private_key]').value = d.private_key;
    form.querySelector('[name=reality_public_key]').value = d.public_key;
    form.querySelector('[name=reality_short_id]').value = d.short_id;
    form.querySelector('.ib-priv').textContent = d.private_key.slice(0,16)+'…';
    form.querySelector('.ib-pub').textContent = d.public_key.slice(0,16)+'…';
    form.querySelector('.ib-sid').textContent = d.short_id;
    if (btn) btn.textContent = '✓ 已生成';
  } catch(e) {
    if (btn) btn.textContent = '⟳ 生成';
    showToast('密钥生成失败: ' + e.message, 'error');
  }
}
// 新建 Inbound 表单协议字段动态显隐
function ibSync(form) {
  if (!form) return;
  const p = form.querySelector('[name=protocol]')?.value || 'vless';
  form.querySelectorAll('.ib-vless').forEach(el => el.classList.toggle('hidden', p !== 'vless'));
  form.querySelectorAll('.ib-trojan').forEach(el => el.classList.toggle('hidden', p !== 'trojan'));
  form.querySelectorAll('.ib-ss').forEach(el => el.classList.toggle('hidden', p !== 'shadowsocks'));
}
document.addEventListener('htmx:afterSettle', function() {
  const form = document.getElementById('ib-new-form');
  if (form) ibSync(form);
});
// 批量操作：收集选中的用户 ID 并发送
async function batchAction(action) {
  const checked = Array.from(document.querySelectorAll('input.user-cb:checked'));
  if (checked.length === 0) { showToast('请先选择用户', 'error'); return; }
  if (action === 'delete' && !confirm('确定删除所选 ' + checked.length + ' 个用户？')) return;
  const params = new URLSearchParams();
  params.append('action', action);
  checked.forEach(cb => params.append('ids', cb.value));
  const res = await fetch('/panel/users/batch', {
    method: 'POST',
    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
    body: params.toString(),
    credentials: 'same-origin',
  });
  const html = await res.text();
  if (res.ok) {
    document.getElementById('users-tbody').innerHTML = html;
    htmx.process(document.getElementById('users-tbody'));
    updateBatchBar();
  } else {
    try { showToast(JSON.parse(html).error, 'error'); } catch { showToast('操作失败', 'error'); }
  }
}
// 更新批量操作工具栏显隐
function updateBatchBar() {
  const bar = document.getElementById('batch-bar');
  if (!bar) return;
  const count = document.querySelectorAll('input.user-cb:checked').length;
  bar.classList.toggle('hidden', count === 0);
  const label = bar.querySelector('#batch-count');
  if (label) label.textContent = '已选 ' + count + ' 个';
}
// select-all 联动
function toggleSelectAll(master) {
  document.querySelectorAll('input.user-cb').forEach(cb => cb.checked = master.checked);
  updateBatchBar();
}
document.addEventListener('htmx:afterSettle', updateBatchBar);
</script>
{{end}}
