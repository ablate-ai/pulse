{{define "login"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>{{template "head" .}}</head>
<body class="bg-gray-950 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-sm px-4">
    <div class="text-center mb-8">
      <div class="text-indigo-400 text-4xl font-bold mb-2">◈</div>
      <h1 class="text-white text-2xl font-bold">Pulse</h1>
      <p class="text-gray-500 text-sm mt-1">控制面板</p>
    </div>
    <div class="bg-gray-900 rounded-xl border border-gray-800 p-8 shadow-2xl">
      <form action="/login" method="POST" class="space-y-4">
        <div>
          <input type="text" name="username" placeholder="用户名" required autocomplete="username"
                 class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-gray-100 placeholder-gray-500 text-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors">
        </div>
        <div>
          <input type="password" name="password" placeholder="密码" required autocomplete="current-password"
                 class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-gray-100 placeholder-gray-500 text-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors">
        </div>
        {{with .Data}}{{if .Error}}
        <div class="text-red-400 text-sm text-center bg-red-500/10 rounded-lg py-2">{{.Error}}</div>
        {{end}}{{end}}
        <button type="submit"
                class="w-full bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white font-medium py-2.5 rounded-lg text-sm transition-colors">
          登录
        </button>
      </form>
      {{with .Data}}{{if .DiscourseEnabled}}
      <div class="mt-4 flex items-center gap-3">
        <div class="flex-1 border-t border-gray-700"></div>
        <span class="text-xs text-gray-600">或</span>
        <div class="flex-1 border-t border-gray-700"></div>
      </div>
      <a href="/auth/discourse"
         class="mt-4 flex items-center justify-center gap-2 w-full bg-gray-800 hover:bg-gray-700 border border-gray-700 text-gray-300 hover:text-white font-medium py-2.5 rounded-lg text-sm transition-colors">
        <svg class="w-4 h-4" viewBox="0 0 32 32" fill="currentColor"><path d="M16.1 0C7.3 0 0 7.1 0 15.9c0 8.8 7.3 16 16.1 16 .5 0 1 0 1.5-.1V24.7h-4.2v-5.3h4.2v-3.9c0-4.2 2.6-6.5 6.4-6.5 1.8 0 3.4.1 3.8.2v4.4h-2.6c-2 0-2.4 1-2.4 2.4v3.1h4.9l-.6 5.3h-4.3v6.9C27.2 29.5 32 23.2 32 15.9 32 7.1 24.9 0 16.1 0z"/></svg>
        通过 Discourse 登录
      </a>
      {{end}}{{end}}
    </div>
  </div>
</body>
</html>
{{end}}
