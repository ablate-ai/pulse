{{define "users"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>{{template "head" .}}</head>
<body class="bg-gray-950 text-gray-100 flex flex-col h-screen">
{{template "mobile-header" .}}
<div class="flex flex-1 overflow-hidden">
  <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-60 bg-gray-900 border-r border-gray-800 flex-shrink-0 -translate-x-full lg:relative lg:inset-auto lg:translate-x-0 transition-transform duration-200">
    {{template "nav" .}}
  </aside>
  <div class="flex-1 overflow-auto">
    <div class="p-4 md:p-6">
      <div class="flex flex-wrap items-center justify-between gap-3 mb-6">
        <div>
          <h1 class="text-xl font-semibold text-gray-100">Users</h1>
          <p class="text-sm text-gray-500 mt-0.5">用户管理</p>
        </div>
        <button class="flex items-center gap-1.5 bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors"
                hx-get="/panel/users/new"
                hx-target="#modal-body"
                hx-on::after-request="document.getElementById('app-modal').showModal()">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          添加用户
        </button>
      </div>

      <div class="flex flex-wrap gap-3 mb-4">
        <input type="search" name="q" placeholder="搜索用户名..."
               hx-get="/panel/users/list"
               hx-trigger="input delay:300ms, search"
               hx-target="#users-tbody"
               hx-include="[name='status-filter']"
               class="flex-1 bg-gray-900 border border-gray-800 rounded-lg px-4 py-2 text-sm text-gray-100 placeholder-gray-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors">
        <select id="status-filter" name="status-filter"
                hx-get="/panel/users/list"
                hx-trigger="change"
                hx-target="#users-tbody"
                hx-include="[name='q']"
                class="bg-gray-900 border border-gray-800 rounded-lg px-3 py-2 text-sm text-gray-100 focus:outline-none focus:border-indigo-500 transition-colors">
          <option value="">全部状态</option>
          <option value="active">Active</option>
          <option value="disabled">Disabled</option>
          <option value="limited">Limited</option>
          <option value="expired">Expired</option>
          <option value="on_hold">On Hold</option>
        </select>
      </div>

      <!-- 批量操作工具栏（有选中时才显示） -->
      <div id="batch-bar" class="hidden flex items-center gap-2 mb-3 px-4 py-2.5 bg-indigo-600/10 border border-indigo-600/30 rounded-lg">
        <span id="batch-count" class="text-xs text-indigo-400 mr-2"></span>
        <button onclick="batchAction('enable')" class="text-xs px-3 py-1.5 rounded bg-emerald-600/20 text-emerald-400 hover:bg-emerald-600/30 transition-colors">启用</button>
        <button onclick="batchAction('disable')" class="text-xs px-3 py-1.5 rounded bg-gray-700 text-gray-300 hover:bg-gray-600 transition-colors">禁用</button>
        <button onclick="batchAction('delete')" class="text-xs px-3 py-1.5 rounded bg-red-600/20 text-red-400 hover:bg-red-600/30 transition-colors">删除</button>
      </div>

      <div class="rounded-xl border border-gray-800 overflow-auto">
        <table class="w-full text-sm bg-gray-900 min-w-[700px]">
          <thead>
            <tr class="border-b border-gray-800">
              <th class="px-4 py-3 w-8"><input type="checkbox" class="rounded border-gray-600 bg-gray-800 text-indigo-500 focus:ring-indigo-500" onchange="toggleSelectAll(this)"></th>
              <th class="text-left text-xs font-medium text-gray-500 uppercase tracking-wide px-4 py-3">用户名</th>
              <th class="text-left text-xs font-medium text-gray-500 uppercase tracking-wide px-4 py-3">状态</th>
              <th class="text-left text-xs font-medium text-gray-500 uppercase tracking-wide px-4 py-3">流量</th>
              <th class="text-left text-xs font-medium text-gray-500 uppercase tracking-wide px-4 py-3">到期时间</th>
              <th class="text-left text-xs font-medium text-gray-500 uppercase tracking-wide px-4 py-3">最后在线</th>
              <th class="text-left text-xs font-medium text-gray-500 uppercase tracking-wide px-4 py-3">连接数</th>
              <th class="text-left text-xs font-medium text-gray-500 uppercase tracking-wide px-4 py-3">设备数</th>
              <th class="text-left text-xs font-medium text-gray-500 uppercase tracking-wide px-4 py-3">操作</th>
            </tr>
          </thead>
          <tbody id="users-tbody"
                 hx-get="/panel/users/list"
                 hx-trigger="load"
                 hx-include="[name='status-filter']"
                 hx-swap="innerHTML">
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

{{template "modal-container" .}}
{{template "toast" .}}

<script>
// 从 dashboard "需关注" 卡片跳转时，预设状态筛选
(function() {
  const params = new URLSearchParams(location.search);
  const status = params.get('status');
  if (!status) return;
  // expiring 是前端虚拟状态，映射到 active + 近期过期，用搜索框无法直接过滤
  // 其余状态直接映射到 select
  const sel = document.getElementById('status-filter');
  if (sel && status !== 'expiring') sel.value = status;
})();

function copySubLink(subToken) {
  const url = window.location.origin + '/sub/' + subToken;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(url).then(() => {
      showToast('已复制订阅链接');
    }).catch(() => {
      prompt('订阅链接：', url);
    });
  } else {
    // HTTP 环境下 clipboard API 不可用，回退到 prompt
    prompt('订阅链接：', url);
  }
}
</script>
</body>
</html>
{{end}}
