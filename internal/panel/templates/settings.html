{{define "settings"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>{{template "head" .}}</head>
<body class="bg-gray-950 text-gray-100">
<div class="flex h-screen overflow-hidden">
  <aside class="w-60 bg-gray-900 border-r border-gray-800 flex-shrink-0">
    {{template "nav" .}}
  </aside>
  <div class="flex-1 overflow-auto">
    <div class="p-6 max-w-2xl">
      <div class="mb-6">
        <h1 class="text-xl font-semibold text-gray-100">Settings</h1>
        <p class="text-sm text-gray-500 mt-0.5">系统设置</p>
      </div>

      <!-- 修改密码 -->
      <div class="bg-gray-900 rounded-xl border border-gray-800 p-5 mb-4">
        <h2 class="text-sm font-semibold text-gray-100 mb-4">修改管理员密码</h2>
        <form hx-post="/panel/settings/password"
              hx-target="#pw-result"
              hx-swap="innerHTML"
              hx-on::after-request="if(event.detail.successful) this.reset()"
              class="space-y-3">
          <div>
            <label class="block text-xs font-medium text-gray-400 mb-1.5">当前密码</label>
            <input type="password" name="current_password" required
                   class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-100 focus:outline-none focus:border-indigo-500 transition-colors">
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-400 mb-1.5">新密码（至少 6 位）</label>
            <input type="password" name="new_password" required minlength="6"
                   class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-100 focus:outline-none focus:border-indigo-500 transition-colors">
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-400 mb-1.5">确认新密码</label>
            <input type="password" name="confirm_password" required minlength="6"
                   class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-100 focus:outline-none focus:border-indigo-500 transition-colors">
          </div>
          <div id="pw-result"></div>
          <div class="pt-1">
            <button type="submit"
                    class="px-4 py-2 text-sm text-white bg-indigo-600 hover:bg-indigo-500 rounded-lg transition-colors">更新密码</button>
          </div>
        </form>
        <p class="text-xs text-gray-600 mt-3">密码修改后永久生效。如需强制重置，可删除数据库中的 settings 记录或修改环境变量 <code class="text-gray-500">PULSE_ADMIN_PASSWORD</code> 后重启。</p>
      </div>

    </div>
  </div>
</div>
{{template "modal-container" .}}
{{template "toast" .}}
</body>
</html>
{{end}}
