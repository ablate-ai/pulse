{{define "dashboard"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>{{template "head" .}}</head>
<body class="bg-gray-950 text-gray-100 flex flex-col h-screen">
{{template "mobile-header" .}}
<div class="flex flex-1 overflow-hidden">
  <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-60 bg-gray-900 border-r border-gray-800 flex-shrink-0 -translate-x-full lg:relative lg:inset-auto lg:translate-x-0 transition-transform duration-200">
    {{template "nav" .}}
  </aside>
  <div class="flex-1 overflow-auto">
    <div class="p-4 md:p-6">
      <div class="mb-6">
        <h1 class="text-xl font-semibold text-gray-100">Overview</h1>
        <p class="text-sm text-gray-500 mt-0.5">系统概览</p>
      </div>

      <div id="stats-container" hx-get="/panel/stats" hx-trigger="load, every 30s" hx-swap="innerHTML">
        <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
          <div class="bg-gray-900 rounded-xl border border-gray-800 p-5">
            <div class="text-2xl font-bold text-gray-100">—</div>
            <div class="text-xs text-gray-500 mt-1">加载中...</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

{{template "modal-container" .}}
{{template "toast" .}}
</body>
</html>
{{end}}
