{{define "dashboard"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>{{template "head" .}}</head>
<body class="bg-gray-950 text-gray-100 flex flex-col h-screen">
{{template "mobile-header" .}}
<div class="flex flex-1 overflow-hidden">
  <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-60 bg-gray-900 border-r border-gray-800 flex-shrink-0 -translate-x-full lg:relative lg:inset-auto lg:translate-x-0 transition-transform duration-200">
    {{template "nav" .}}
  </aside>
  <div class="flex-1 overflow-auto">
    <div class="p-4 md:p-6">
      <div class="mb-6">
        <h1 class="text-xl font-semibold text-gray-100">Overview</h1>
        <p class="text-sm text-gray-500 mt-0.5">系统概览</p>
      </div>

      <!-- 节点实时状态（SSE 推送） -->
      <div id="node-metrics-container" class="mb-4">
        <div class="bg-gray-900 rounded-xl border border-gray-800 p-5 text-sm text-gray-600 animate-pulse">正在获取节点状态...</div>
      </div>

      <div id="stats-container" hx-get="/panel/stats" hx-trigger="load, every 30s" hx-swap="innerHTML">
        <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
          <div class="bg-gray-900 rounded-xl border border-gray-800 p-5">
            <div class="text-2xl font-bold text-gray-100">—</div>
            <div class="text-xs text-gray-500 mt-1">加载中...</div>
          </div>
        </div>
      </div>

      <!-- 快捷入口 -->
      <div class="mt-6">
        <h2 class="text-xs font-medium text-gray-600 uppercase tracking-wider mb-3">快捷入口</h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
          <a href="/stat" target="_blank" rel="noopener"
             class="flex items-center gap-3 bg-gray-900 border border-gray-800 rounded-xl px-4 py-3.5 hover:border-indigo-500/50 hover:bg-gray-800/60 transition-colors group">
            <div class="w-8 h-8 rounded-lg bg-indigo-500/15 flex items-center justify-center flex-shrink-0">
              <svg class="w-4 h-4 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            <div class="min-w-0">
              <div class="text-sm font-medium text-gray-200 group-hover:text-white transition-colors">节点状态</div>
              <div class="text-xs text-gray-600 truncate">公开解锁检测状态页 · /stat</div>
            </div>
            <svg class="w-3.5 h-3.5 text-gray-700 ml-auto flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14L21 3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </a>
          {{if .ShopEnabled}}
          <a href="/shop" target="_blank" rel="noopener"
             class="flex items-center gap-3 bg-gray-900 border border-gray-800 rounded-xl px-4 py-3.5 hover:border-purple-500/50 hover:bg-gray-800/60 transition-colors group">
            <div class="w-8 h-8 rounded-lg bg-purple-500/15 flex items-center justify-center flex-shrink-0">
              <svg class="w-4 h-4 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="3" y1="6" x2="21" y2="6" stroke-width="2" stroke-linecap="round"/><path d="M16 10a4 4 0 0 1-8 0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            <div class="min-w-0">
              <div class="text-sm font-medium text-gray-200 group-hover:text-white transition-colors">订阅商城</div>
              <div class="text-xs text-gray-600 truncate">用户自助订阅入口 · /shop</div>
            </div>
            <svg class="w-3.5 h-3.5 text-gray-700 ml-auto flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14L21 3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </a>
          {{end}}
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  function sanitizeHTML(html) {
    var doc = new DOMParser().parseFromString(html, 'text/html');
    doc.querySelectorAll('script').forEach(function(el) { el.remove(); });
    doc.querySelectorAll('*').forEach(function(el) {
      for (var i = el.attributes.length - 1; i >= 0; i--) {
        if (el.attributes[i].name.startsWith('on')) {
          el.removeAttribute(el.attributes[i].name);
        }
      }
      if (el.tagName === 'A') {
        var href = el.getAttribute('href') || '';
        if (href.toLowerCase().trim().startsWith('javascript:')) {
          el.removeAttribute('href');
        }
      }
    });
    return doc.body.innerHTML;
  }

  var container = document.getElementById('node-metrics-container');
  var es = new EventSource('/panel/node-metrics/stream');
  es.addEventListener('update', function(e) {
    container.innerHTML = sanitizeHTML(e.data);
  });
})();
</script>

{{template "modal-container" .}}
{{template "toast" .}}
</body>
</html>
{{end}}
