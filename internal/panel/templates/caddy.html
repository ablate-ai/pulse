{{define "caddy"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>{{template "head" .}}</head>
<body class="bg-gray-950 text-gray-100 flex flex-col h-screen">
{{template "mobile-header" .}}
<div class="flex flex-1 overflow-hidden">
  <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-60 bg-gray-900 border-r border-gray-800 flex-shrink-0 -translate-x-full lg:relative lg:inset-auto lg:translate-x-0 transition-transform duration-200">
    {{template "nav" .}}
  </aside>
  <div class="flex-1 overflow-auto">
    <div class="p-4 md:p-6">
      <div class="flex flex-wrap items-center justify-between gap-3 mb-6">
        <div>
          <h1 class="text-xl font-semibold text-gray-100">Caddy</h1>
          <p class="text-sm text-gray-500 mt-0.5">反向代理管理</p>
        </div>
        <button class="flex items-center gap-1.5 text-gray-400 hover:text-gray-100 text-sm px-3 py-2 rounded-lg hover:bg-gray-800 transition-colors"
                hx-get="/panel/caddy/list"
                hx-target="#caddy-list"
                hx-swap="innerHTML">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
          刷新
        </button>
      </div>

      <div id="caddy-list"
           hx-get="/panel/caddy/list"
           hx-trigger="load"
           hx-swap="innerHTML"
           class="space-y-4">
        <div class="text-center text-gray-500 py-8 text-sm">加载中...</div>
      </div>
    </div>
  </div>
</div>

{{template "modal-container" .}}
{{template "toast" .}}
</body>
</html>
{{end}}
