<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Pulse</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>

<div class="shell">
  <!-- ─── Sidebar ───────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="brand">
      <span class="brand-icon">◈</span>
      <span class="brand-name">Pulse</span>
    </div>

    <nav id="app-nav" class="nav" hidden>
      <a href="/overview" data-route="/overview" class="nav-item">
        <span class="nav-icon">⬡</span> Overview
      </a>
      <a href="/nodes" data-route="/nodes" class="nav-item">
        <span class="nav-icon">⬡</span> Nodes
      </a>
      <a href="/users" data-route="/users" class="nav-item">
        <span class="nav-icon">⬡</span> Users
      </a>
    </nav>

    <div id="auth-panel" class="sidebar-section">
      <p class="section-label">管理员登录</p>
      <form id="login-form" class="form-stack">
        <input id="login-username" placeholder="用户名" autocomplete="username" required>
        <input id="login-password" type="password" placeholder="密码" autocomplete="current-password" required>
        <button type="submit" class="btn btn-primary">登录</button>
      </form>
    </div>

    <div id="quick-panel" class="sidebar-footer" hidden>
      <button id="logout" class="btn btn-ghost btn-sm btn-block btn-danger">退出登录</button>
    </div>
  </aside>

  <!-- ─── Content ──────────────────────────────────────── -->
  <main class="content">
    <header class="topbar">
      <h1 id="page-title" class="page-title">Overview</h1>
      <div id="status" class="status-bar">初始化中...</div>
    </header>

    <div id="app-panel" hidden>

      <!-- Overview ──────────────────────────────────────── -->
      <section id="route-overview" class="route">
        <div class="stats-grid" id="system-info">
          <div class="stat-card skeleton"></div>
          <div class="stat-card skeleton"></div>
          <div class="stat-card skeleton"></div>
          <div class="stat-card skeleton"></div>
        </div>

        <div class="card mt-4">
          <div class="card-head">
            <h3 class="card-title">安装 Node</h3>
          </div>
          <div id="node-install-info" class="install-grid">
            <div class="install-col skeleton" style="height:120px"></div>
            <div class="install-col skeleton" style="height:120px"></div>
          </div>
        </div>
      </section>

      <!-- Nodes ─────────────────────────────────────────── -->
      <section id="route-nodes" class="route" hidden>
        <div class="card">
          <div class="card-head">
            <h3 class="card-title">添加节点</h3>
          </div>
          <form id="node-form" class="form-row">
            <input id="node-name" placeholder="节点名称" required>
            <input id="node-url" placeholder="https://127.0.0.1:8081" required>
            <button type="submit" class="btn btn-primary btn-nowrap">保存</button>
          </form>
        </div>

        <div id="nodes" class="node-grid mt-4 empty-state">暂无节点</div>
      </section>

      <!-- Users ─────────────────────────────────────────── -->
      <section id="route-users" class="route" hidden>
        <div class="users-layout">
          <!-- Create Panel -->
          <div class="card create-panel">
            <div class="card-head">
              <h3 class="card-title">添加用户</h3>
            </div>
            <form id="user-form" class="form-stack">
              <input id="user-name" placeholder="用户名" required>

              <select id="user-protocol" required>
                <option value="vless">VLESS</option>
                <option value="vmess">VMess</option>
                <option value="trojan">Trojan</option>
                <option value="shadowsocks">Shadowsocks</option>
              </select>

              <input id="user-secret" placeholder="密钥（可留空自动生成）">

              <div id="user-method-wrap">
                <input id="user-method" placeholder="加密方式（如 aes-128-gcm）">
              </div>

              <!-- Reality 字段（VLESS 专用） -->
              <div id="user-reality-wrap" hidden>
                <div class="form-row">
                  <input id="user-reality-sni" placeholder="目标域名，如 www.google.com" style="flex:1">
                  <button type="button" id="btn-gen-keypair" class="btn btn-ghost btn-sm">一键生成</button>
                </div>
                <input id="user-reality-pubkey" placeholder="公钥">
                <input id="user-reality-privkey" placeholder="私钥（服务端）">
                <input id="user-reality-shortid" placeholder="Short ID">
              </div>

              <div class="form-row-2">
                <input id="user-domain" placeholder="example.com" required>
                <input id="user-port" placeholder="443" type="number" min="1" max="65535" required>
              </div>

              <input id="user-traffic-limit" placeholder="流量上限 GB（0=不限）" type="number" min="0" step="0.1">

              <select id="user-reset-strategy">
                <option value="no_reset">流量不重置</option>
                <option value="day">每天重置</option>
                <option value="week">每周重置</option>
                <option value="month">每月重置</option>
                <option value="year">每年重置</option>
              </select>

              <div class="field-group">
                <label class="field-label" for="user-expire-at">过期时间（可选）</label>
                <input id="user-expire-at" type="datetime-local">
              </div>

              <select id="user-node" required>
                <option value="">选择节点</option>
              </select>

              <button type="submit" class="btn btn-primary">创建用户</button>
            </form>
          </div>

          <!-- User List -->
          <div>
            <div class="list-toolbar">
              <input id="user-search" placeholder="搜索用户名 / 节点 / 域名" class="search-input">
              <select id="user-filter-protocol" class="filter-select">
                <option value="">全部协议</option>
                <option value="vless">VLESS</option>
                <option value="vmess">VMess</option>
                <option value="trojan">Trojan</option>
                <option value="shadowsocks">Shadowsocks</option>
              </select>
              <select id="user-filter-status" class="filter-select">
                <option value="">全部状态</option>
                <option value="active">Active</option>
                <option value="disabled">Disabled</option>
                <option value="limited">Limited</option>
                <option value="expired">Expired</option>
                <option value="on_hold">On Hold</option>
              </select>
            </div>
            <div id="users" class="user-list empty-state">暂无用户</div>
          </div>
        </div>
      </section>

    </div><!-- /app-panel -->
  </main>
</div><!-- /shell -->

<!-- ─── Edit User Modal ────────────────────────────────── -->
<dialog id="edit-modal" class="modal">
  <div class="modal-box">
    <div class="modal-head">
      <h3 class="modal-title">编辑用户</h3>
      <button id="edit-modal-close" type="button" class="btn-icon">✕</button>
    </div>
    <form id="edit-form" class="form-stack">
      <input type="hidden" id="edit-user-id">

      <div class="field-group">
        <label class="field-label">状态</label>
        <select id="edit-status">
          <option value="active">Active（活跃）</option>
          <option value="disabled">Disabled（手动停用）</option>
          <option value="on_hold">On Hold（暂停）</option>
        </select>
      </div>

      <div class="field-group">
        <label class="field-label">流量上限 GB（0 = 不限）</label>
        <input id="edit-traffic-limit" type="number" min="0" step="0.1">
      </div>

      <div class="field-group">
        <label class="field-label">流量重置策略</label>
        <select id="edit-reset-strategy">
          <option value="no_reset">不重置</option>
          <option value="day">每天</option>
          <option value="week">每周</option>
          <option value="month">每月</option>
          <option value="year">每年</option>
        </select>
      </div>

      <div class="field-group">
        <label class="field-label">过期时间（留空 = 永不过期）</label>
        <input id="edit-expire-at" type="datetime-local">
      </div>

      <div class="modal-actions">
        <button type="button" id="edit-modal-cancel" class="btn btn-ghost">取消</button>
        <button type="submit" class="btn btn-primary">保存修改</button>
      </div>
    </form>
  </div>
</dialog>

<div id="toast" class="toast" aria-live="polite"></div>

<script src="/wasm_exec.js"></script>
<script>
  const go = new Go();
  WebAssembly.instantiateStreaming(fetch("/app.wasm"), go.importObject)
    .then(result => go.run(result.instance))
    .catch(err => {
      const el = document.getElementById("status");
      if (el) el.textContent = "WASM 加载失败: " + err;
    });

  let _toastTimer;
  function copyText(text) {
    navigator.clipboard.writeText(text).then(() => {
      const t = document.getElementById("toast");
      t.textContent = "已复制";
      t.classList.add("toast-show");
      clearTimeout(_toastTimer);
      _toastTimer = setTimeout(() => t.classList.remove("toast-show"), 1800);
    });
  }
</script>
</body>
</html>
